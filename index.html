<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#d96b52">
  <title>ADHD Focus Timer</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Roboto+Mono:wght@700&family=Nunito:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="wrapper">
    <button id="infoButton" aria-label="Open information">i</button>

    <aside class="sidebar">
      <div id="predefined" class="section">
        <label id="presetPomodoroLabel" class="option">
          <input id="presetPomodoro" type="radio" name="preset">
          <span class="label">Classic Pomodoro</span>
        </label>
        <label id="presetAdhdLabel" class="option">
          <input id="presetAdhd" type="radio" name="preset">
          <span class="label">ADHD friendly</span>
        </label>
        <label id="presetSprintLabel" class="option">
          <input id="presetSprint" type="radio" name="preset">
          <span class="label">Deep work sprint</span>
        </label>
      </div>

      <div id="controls" class="section">
        <button id="focusMode" class="option">Focus</button>
        <button id="shortBreakMode" class="option">Short break</button>
        <button id="longBreakMode" class="option">Long break</button>
        <button id="startPauseButton" class="option">Start</button>
        <button id="resetButton" class="option">Reset</button>
      </div>

      <div id="times" class="section">
        <label class="option">Focus minutes <input id="focus" type="number" min="1" max="180" value="25"><span class="tooltip">1 to 180 minutes</span></label>
        <label class="option">Short break <input id="shortBreak" type="number" min="1" max="60" value="5"><span class="tooltip">1 to 60 minutes</span></label>
        <label class="option">Long break <input id="longBreak" type="number" min="1" max="120" value="15"><span class="tooltip">1 to 120 minutes</span></label>
        <label class="option">Long break every <input id="longBreakEvery" type="number" min="1" max="12" value="4"><span class="tooltip">After this many focus sessions</span></label>
      </div>

      <div id="settings" class="section">
        <label class="option"><input id="autoStartBreaks" type="checkbox"><span class="label">Auto-start breaks</span></label>
        <label class="option"><input id="autoStartFocus" type="checkbox"><span class="label">Auto-start focus</span></label>
        <label class="option"><input id="sound" type="checkbox" checked><span class="label">Sound alerts</span></label>
        <button id="applySettings" class="option">Apply settings</button>
      </div>
    </aside>

    <div class="clockWrapper">
      <div class="clockInnerWrapper">
        <div class="clock">
          <div id="modeLabel">Focus</div>
          <div id="timeDisplay">25:00</div>
        </div>
      </div>
    </div>

    <div id="grower"></div>

    <div id="info">
      <div class="info__inner">
        <h2>ADHD Focus Timer</h2>
        <p>This timer gives you quick presets, editable focus and break lengths, and a simple full-screen clock that is easy to read.</p>
        <p>Use Classic Pomodoro for standard study blocks, ADHD friendly for shorter loops, or Deep work sprint for longer sessions.</p>
        <button id="closeInfo" class="option" style="margin-top:1rem;">Close</button>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
